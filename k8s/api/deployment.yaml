apiVersion: apps/v1
kind: Deployment
metadata:
  name: mavenflow-api
  namespace: mavenflow
  labels:
    app: mavenflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mavenflow-api
  template:
    metadata:
      labels:
        app: mavenflow-api
    spec:
      containers:
        - name: api
          image: your-registry/mavenflow-api:latest  # substitua pelo seu registry
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
